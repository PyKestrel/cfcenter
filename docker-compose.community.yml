# ============================================
# CFCenter Community Edition
# Frontend only - No orchestrator required
# ============================================

services:
  # ========================================
  # Frontend (Next.js + WebSocket Proxy)
  # ========================================
  frontend:
    image: ghcr.io/adminsyspro/cfcenter-frontend:${VERSION:-latest}
    container_name: cfcenter-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"  # Unified HTTP + WebSocket
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/cfcenter.db
      - APP_SECRET=${APP_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - APP_URL=${APP_URL:-http://localhost:3000}
      # No ORCHESTRATOR_URL = Community mode
      # GUI update support (mount Docker socket + repo for in-app updates)
      - CFCENTER_REPO_DIR=/repo
      - CFCENTER_CONTAINER_NAME=cfcenter-frontend
      - CFCENTER_IMAGE_NAME=cfcenter-frontend:dev
    volumes:
      - cfcenter_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # GUI updates
      - .:/repo                                        # Source repo for git pull + rebuild
    networks:
      - cfcenter
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ========================================
# Networks
# ========================================
networks:
  cfcenter:
    driver: bridge
    name: cfcenter

# ========================================
# Volumes
# ========================================
volumes:
  cfcenter_data:
    name: cfcenter_data
