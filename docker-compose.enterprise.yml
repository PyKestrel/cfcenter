# ============================================
# CFCenter Enterprise Edition
# Full stack with orchestrator backend
# ============================================

services:
  # ========================================
  # Frontend (Next.js + WebSocket Proxy)
  # ========================================
  frontend:
    image: ghcr.io/adminsyspro/cfcenter-frontend:${VERSION:-latest}
    container_name: cfcenter-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"  # Unified HTTP + WebSocket
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/cfcenter.db
      - APP_SECRET=${APP_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - ORCHESTRATOR_URL=http://orchestrator:8080
    volumes:
      - cfcenter_data:/app/data
    networks:
      - cfcenter
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================
  # Orchestrator (Go Backend)
  # ========================================
  orchestrator:
    image: ghcr.io/adminsyspro/cfcenter-orchestrator:${VERSION:-latest}
    container_name: cfcenter-orchestrator
    restart: unless-stopped
    environment:
      - APP_SECRET=${APP_SECRET}
      - LICENSE_KEY=${LICENSE_KEY:-}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - orchestrator_data:/app/data
      - cfcenter_data:/app/shared_data:ro
      - ./config/orchestrator.yaml:/app/config.yaml:ro
    networks:
      - cfcenter
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ========================================
# Networks
# ========================================
networks:
  cfcenter:
    driver: bridge
    name: cfcenter

# ========================================
# Volumes
# ========================================
volumes:
  cfcenter_data:
    name: cfcenter_data
  orchestrator_data:
    name: orchestrator_data
